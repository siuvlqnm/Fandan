<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>给谁做饭 / 饭单</title>
		<link rel="preconnect" href="https://cdn.jsdelivr.net" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" />
		<link rel="stylesheet" href="./app.css" />
	</head>
	<body>
		<main class="stage">
			<section class="app" aria-label="给谁做饭">
				<div class="screen">
					<header class="topbar with-back">
						<div class="brand with-back">
							<a class="back-btn" href="./home.html" aria-label="返回"><i class="ri-arrow-left-s-line"></i></a>
							<div>
								<h1>给谁做饭</h1>
								<p>安排饭时直接选</p>
							</div>
						</div>
						<button class="icon-button" type="button" aria-label="新增目标" onclick="document.getElementById('new-target').scrollIntoView({behavior:'smooth'})"><i class="ri-add-line"></i></button>
					</header>

					<section class="page-title">
						<span class="eyebrow green"><i class="ri-group-line"></i> 目标</span>
						<h2>不同场合不同饭</h2>
						<p>家里、聚餐、客户……存好人数和口味，安排饭时一键带入。</p>
					</section>

					<section class="card-list">
						<article class="soft-card" style="display:grid;gap:9px;">
							<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
								<div style="display:flex;align-items:center;gap:11px;">
									<span class="avatar-text" style="width:42px;height:42px;"><i class="ri-home-line"></i></span>
									<div><strong style="display:block;font-size:17px;font-weight:850;">家里</strong><span style="color:var(--muted);font-size:12px;">4 人 · 家常</span></div>
								</div>
								<span class="state-pill green">常用</span>
							</div>
							<p style="margin:0;color:#595550;font-size:13px;line-height:1.35;">清淡为主，弟弟爱吃辣可单独调。预算不限。</p>
							<div style="display:flex;gap:6px;flex-wrap:wrap;">
								<span class="pill">清淡</span>
								<span class="pill">下饭</span>
								<span class="pill">忌生冷</span>
							</div>
							<div style="display:flex;gap:8px;">
								<button class="ghost-btn" type="button" style="height:38px;font-size:13px;"><i class="ri-edit-line"></i> 编辑</button>
								<button class="primary-btn" type="button" style="height:38px;font-size:13px;" onclick="location.href='./meal-plan-new.html'">用这个安排饭</button>
							</div>
						</article>

						<article class="soft-card" style="display:grid;gap:9px;">
							<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
								<div style="display:flex;align-items:center;gap:11px;">
									<span class="avatar-text" style="width:42px;height:42px;"><i class="ri-cake-3-line"></i></span>
									<div><strong style="display:block;font-size:17px;font-weight:850;">朋友聚餐</strong><span style="color:var(--muted);font-size:12px;">6 人 · 丰盛</span></div>
								</div>
								<span class="state-pill">偶尔</span>
							</div>
							<p style="margin:0;color:#595550;font-size:13px;line-height:1.35;">有荤有素有硬菜，预算 300 左右。</p>
							<div style="display:flex;gap:6px;flex-wrap:wrap;">
								<span class="pill">宴客</span>
								<span class="pill">硬菜</span>
								<span class="pill">有酒</span>
							</div>
							<div style="display:flex;gap:8px;">
								<button class="ghost-btn" type="button" style="height:38px;font-size:13px;"><i class="ri-edit-line"></i> 编辑</button>
								<button class="ghost-btn" type="button" style="height:38px;font-size:13px;color:var(--coral);"><i class="ri-delete-bin-line"></i> 删除</button>
							</div>
						</article>

						<article class="soft-card" style="display:grid;gap:9px;">
							<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
								<div style="display:flex;align-items:center;gap:11px;">
									<span class="avatar-text" style="width:42px;height:42px;"><i class="ri-briefcase-line"></i></span>
									<div><strong style="display:block;font-size:17px;font-weight:850;">客户</strong><span style="color:var(--muted);font-size:12px;">2 人 · 清淡</span></div>
								</div>
								<span class="state-pill">偶尔</span>
							</div>
							<p style="margin:0;color:#595550;font-size:13px;line-height:1.35;">忌辣、忌牛羊肉，精致少油。联系人张经理。</p>
							<div style="display:flex;gap:6px;flex-wrap:wrap;">
								<span class="pill">忌辣</span>
								<span class="pill">精致</span>
								<span class="pill">少油</span>
							</div>
						</article>
					</section>

					<!-- 新建目标 -->
					<section class="section-head" id="new-target">
						<div>
							<h3>加一个目标</h3>
							<p>比如"周末家人"或"团建"</p>
						</div>
					</section>
					<section class="form-card">
						<div class="field">
							<div class="field-label"><strong>名称</strong></div>
							<input class="text-input" type="text" placeholder="比如：周末家人" />
						</div>
						<div class="field">
							<div class="field-label"><strong>类型</strong></div>
							<div class="chip-row">
								<span class="chip active">家里</span>
								<span class="chip">客户</span>
								<span class="chip">聚餐</span>
								<span class="chip">其他</span>
							</div>
						</div>
						<div class="field">
							<div class="field-label"><strong>人数</strong></div>
							<input class="text-input" type="number" value="4" />
						</div>
						<div class="field">
							<div class="field-label"><strong>口味 / 忌口</strong></div>
							<textarea class="textarea" placeholder="清淡为主，弟弟爱吃辣，忌生冷"></textarea>
						</div>
						<div class="field">
							<div class="field-label"><strong>预算 / 联系人</strong><span class="hint">可选</span></div>
							<input class="text-input" type="text" placeholder="预算 200 / 联系人备注" />
						</div>
					</section>
				</div>

				<div class="sticky-action">
					<button class="primary-btn block lg" type="button">保存目标 <i class="ri-check-line"></i></button>
				</div>

				<nav class="tabbar" aria-label="底部导航">
					<a class="tab" href="./today.html"><i class="ri-bowl-line"></i><span>今天</span></a>
					<a class="tab" href="./dishes.html"><i class="ri-cooking-pot-line"></i><span>常做菜</span></a>
					<a class="tab" href="./shopping.html"><i class="ri-shopping-basket-2-line"></i><span>买菜</span></a>
					<a class="tab active" href="./home.html"><i class="ri-home-5-line"></i><span>家</span></a>
				</nav>
			</section>
		</main>
		<script>
			document.querySelectorAll(".chip").forEach((c) =>
				c.addEventListener("click", () => {
					c.parentElement.querySelectorAll(".chip").forEach((i) => i.classList.remove("active"));
					c.classList.add("active");
				})
			);
		</script>
	</body>
</html>
