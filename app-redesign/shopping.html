<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>买菜 / 饭单</title>
		<link rel="preconnect" href="https://cdn.jsdelivr.net" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" />
		<link rel="stylesheet" href="./app.css" />
	</head>
	<body>
		<main class="stage">
			<section class="app" aria-label="买菜">
				<div class="screen">
					<header class="topbar">
						<div class="brand">
							<div class="logo"><img src="./assets/reference/logo.png" alt="" /></div>
							<div>
								<h1>买菜</h1>
								<p>少跑一趟，少漏一样</p>
							</div>
						</div>
						<div class="actions">
							<button class="icon-button" type="button" aria-label="添加购物项"><i class="ri-add-line"></i></button>
							<div class="avatar"><img src="./assets/reference/avatar.jpg" alt="" /></div>
						</div>
					</header>

					<section class="page-title">
						<span class="eyebrow"><i class="ri-shopping-basket-2-line"></i> 午餐还缺 6 件</span>
						<h2>今天要买什么？</h2>
						<p>从已安排的饭自动生成，买完就勾掉。临时想起的也能随手加。</p>
					</section>

					<!-- 当前清单：来自哪顿饭 -->
					<section class="hero-card" aria-label="当前购物清单">
						<div class="hero-copy">
							<h3>午餐清单</h3>
							<p>番茄牛腩 + 西兰花 + 米饭。还有 6 项待买。</p>
							<div class="mini">
								<span class="pill orange">待买 6</span>
								<span class="pill green">已买 2</span>
								<span class="pill"><i class="ri-bowl-line"></i> 来自午餐</span>
							</div>
						</div>
						<div class="hero-media"><img src="./assets/reference/basket.jpg" alt="新鲜蔬菜篮" /></div>
					</section>

					<div class="segmented cols-3" aria-label="清单范围">
						<button class="segment active" type="button">待买</button>
						<button class="segment" type="button">今天</button>
						<button class="segment" type="button">本周</button>
					</div>

					<!-- 各饭单的清单 -->
					<section class="section-head">
						<div>
							<h3>今天的清单</h3>
							<p>按饭分组，照着买</p>
						</div>
					</section>
					<section class="card-list">
						<a class="soft-card" href="./shopping-detail.html" style="display:grid;gap:9px;text-decoration:none;">
							<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
								<div>
									<strong style="font-size:18px;font-weight:850;">午餐清单</strong>
									<span style="display:block;margin-top:2px;color:var(--muted);font-size:12px;">6月29日 · 8 项</span>
								</div>
								<span class="state-pill orange">6 待买</span>
							</div>
							<div style="display:flex;gap:6px;flex-wrap:wrap;">
								<span class="pill"><i class="ri-leaf-line"></i> 蔬菜 3</span>
								<span class="pill"><i class="ri-restaurant-line"></i> 肉类 2</span>
								<span class="pill"><i class="ri-seedling-line"></i> 调味 1</span>
							</div>
							<div style="height:8px;border-radius:999px;background:var(--line);overflow:hidden;"><div style="width:25%;height:100%;background:var(--green);"></div></div>
						</a>
						<a class="soft-card" href="./shopping-detail.html" style="display:grid;gap:9px;text-decoration:none;">
							<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
								<div>
									<strong style="font-size:18px;font-weight:850;">晚餐清单</strong>
									<span style="display:block;margin-top:2px;color:var(--muted);font-size:12px;">6月29日 · 6 项</span>
								</div>
								<span class="state-pill green">已确认</span>
							</div>
							<div style="display:flex;gap:6px;flex-wrap:wrap;">
								<span class="pill"><i class="ri-leaf-line"></i> 蔬菜 2</span>
								<span class="pill"><i class="ri-restaurant-line"></i> 鱼类 1</span>
								<span class="pill"><i class="ri-seedling-line"></i> 调味 3</span>
							</div>
							<div style="height:8px;border-radius:999px;background:var(--line);overflow:hidden;"><div style="width:0%;height:100%;background:var(--green);"></div></div>
						</a>
					</section>

					<section class="section-head">
						<div>
							<h3>最近买过</h3>
							<p>上周完成的</p>
						</div>
					</section>
					<section class="card-list">
						<a class="soft-card" href="./shopping-detail.html" style="display:flex;align-items:center;justify-content:space-between;gap:10px;text-decoration:none;opacity:.78;">
							<div>
								<strong style="font-size:15px;font-weight:850;">早餐清单</strong>
								<p style="margin:3px 0 0;color:var(--muted);font-size:12px;">6月28日 · 5 项全买</p>
							</div>
							<span class="state-pill green"><i class="ri-check-line"></i> 完成</span>
						</a>
					</section>
				</div>

				<button class="fab" type="button" aria-label="加购物项"><i class="ri-add-line"></i></button>

				<nav class="tabbar" aria-label="底部导航">
					<a class="tab" href="./today.html"><i class="ri-bowl-line"></i><span>今天</span></a>
					<a class="tab" href="./dishes.html"><i class="ri-cooking-pot-line"></i><span>常做菜</span></a>
					<a class="tab active" href="./shopping.html"><i class="ri-shopping-basket-2-line"></i><span>买菜</span></a>
					<a class="tab" href="./home.html"><i class="ri-home-5-line"></i><span>家</span></a>
				</nav>
			</section>
		</main>
		<script>
			document.querySelectorAll(".segment").forEach((s) =>
				s.addEventListener("click", () => {
					document.querySelectorAll(".segment").forEach((i) => i.classList.remove("active"));
					s.classList.add("active");
				})
			);
		</script>
	</body>
</html>
